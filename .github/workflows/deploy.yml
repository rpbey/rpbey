name: Deploy → rpb-dashboard

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'components/**'
      - 'lib/**'
      - 'public/**'
      - 'next.config.ts'
      - 'package.json'
      - 'bun.lock'
      - '!**.md'
  workflow_dispatch:
    inputs:
      rollback:
        description: "Rollback (non supporté pour rpb-dashboard — redémarre uniquement)"
        type: boolean
        default: false

concurrency:
  group: deploy-rpb-dashboard
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy rpb-dashboard → VPS
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          timeout: 900s
          command_timeout: 12m
          script: |
            set -euo pipefail
            echo "==> Deploy rpb-dashboard (commit: ${{ github.sha }})..."
            next deploy rpb-dashboard --pull
            echo "==> Statut :"
            next service status rpb-dashboard --json

      - name: Résumé
        if: always()
        run: |
          echo "### rpb-dashboard — ${{ job.status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Commit: \`${{ github.sha }}\` par ${{ github.actor }}" >> "$GITHUB_STEP_SUMMARY"
