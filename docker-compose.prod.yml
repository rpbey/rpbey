services:
  # Database
  db:
    image: postgres:17-alpine
    container_name: rpb-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: rpb_password
      POSTGRES_DB: rpb_dashboard
    volumes:
      - rpb-db:/var/lib/postgresql/data
    networks:
      - rpb-network
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Next.js Dashboard
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rpb-dashboard
    restart: always
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: postgresql://postgres:rpb_password@db:5432/rpb_dashboard
      NEXT_PUBLIC_APP_URL: https://rpbey.fr
      BOT_API_URL: http://host.docker.internal:3001
      NODE_ENV: production
    volumes:
      - ./public/uploads:/app/public/uploads
      - ./data:/app/data
    depends_on:
      db:
        condition: service_healthy
    networks:
      - rpb-network

  # Discord Bot runs via systemd (rpb-bot.service), not Docker

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: rpb-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
      - ./public/uploads:/app/public/uploads:ro # Nginx serves uploads directly (read-only)
    depends_on:
      - dashboard
    networks:
      - rpb-network

  # Certbot for SSL (One-off or scheduled)
  certbot:
    image: certbot/certbot
    container_name: rpb-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

networks:
  rpb-network:
    driver: bridge

volumes:
  rpb-db:
    external: true
