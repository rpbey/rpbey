services:
  # Database
  db:
    image: postgres:17-alpine
    container_name: rpb-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: rpb_password
      POSTGRES_DB: rpb_dashboard
    volumes:
      - rpb-db:/var/lib/postgresql/data
    networks:
      - rpb-network
    ports:
      - "127.0.0.1:5433:5432"
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"
        reservations:
          memory: 256m
    command: >
      postgres
        -c shared_buffers=256MB
        -c work_mem=8MB
        -c maintenance_work_mem=128MB
        -c effective_cache_size=512MB
        -c max_connections=50
        -c wal_buffers=8MB
        -c checkpoint_completion_target=0.9
    shm_size: 256mb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Next.js Dashboard
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rpb-dashboard
    restart: always
    env_file: .env
    extra_hosts:
      - "host.docker.internal:172.17.0.1"
    environment:
      DATABASE_URL: postgresql://postgres:rpb_password@db:5432/rpb_dashboard
      NEXT_PUBLIC_APP_URL: https://rpbey.fr
      BOT_API_URL: http://host.docker.internal:3001
      NODE_ENV: production
    volumes:
      - ./public/uploads:/app/public/uploads
      - ./data:/app/data
    ports:
      - "127.0.0.1:3000:3000"
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "2.0"
        reservations:
          memory: 512m
    depends_on:
      db:
        condition: service_healthy
    networks:
      - rpb-network

networks:
  rpb-network:
    driver: bridge

volumes:
  rpb-db:
    external: true
