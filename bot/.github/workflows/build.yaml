name: Build
on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]
jobs:
  build-project:
    name: Build Project
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Project
        uses: actions/checkout@v6.0.1

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Dependencies
        run: bun install

      - name: Check Types
        run: bun tsc

      - name: Check Formatting
        run: bunx prettier --check .

      - name: Check Lint
        run: bun eslint

      - name: Build Image
        run: docker build .
