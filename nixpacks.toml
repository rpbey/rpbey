# Nixpacks configuration for Next.js deployment on Coolify
# See: https://nixpacks.com/docs/configuration/file

[phases.setup]
# Use Node.js 24 which has better ESM/CJS compatibility
nixPkgs = ["nodejs_24", "pnpm-10_x", "openssl"]
aptPkgs = ["curl", "wget"]

[phases.install]
cmds = ["npm install -g corepack@0.24.1 && corepack enable", "pnpm i --frozen-lockfile"]
cacheDirectories = ["/root/.local/share/pnpm/store/v3"]
paths = ["/app/node_modules/.bin"]

[phases.build]
# Run prisma generate using the binary directly, then build Next.js
# The --no-engine flag tells Prisma to skip downloading query engine (already bundled)
cmds = ["./node_modules/.bin/prisma generate", "pnpm run build"]
# Fixed: removed tsconfig.tsbuildinfo from cache as it's a file, not a directory
cacheDirectories = [".next/cache", "node_modules/.cache"]

[start]
cmd = "pnpm run start"
