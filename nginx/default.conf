upstream nextjs_upstream {
    server rpb-dashboard:3000;
}

upstream bot_upstream {
    server 46.224.145.55:3001;
}

upstream tsh_upstream {
    server 46.224.145.55:5000;
}

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name rpbey.fr www.rpbey.fr;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name rpbey.fr www.rpbey.fr;

    # SSL Certificates
    ssl_certificate /etc/letsencrypt/live/rpbey.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rpbey.fr/privkey.pem;
    
    # SSL Performance
    ssl_session_cache shared:SSL:50m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # Static Files Caching (Next.js)
    location /_next/static {
        proxy_pass http://nextjs_upstream;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header Host $host;
        expires 365d;
        access_log off;
    }

    location /static {
        proxy_pass http://nextjs_upstream;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header Host $host;
        expires 365d;
        access_log off;
    }

    # Public Uploads (Avatars, etc.)
    location /uploads {
        proxy_pass http://nextjs_upstream;
        proxy_set_header Host $host;
        expires 30d;
        access_log off;
    }

    # Images & fonts — long cache, served directly
    location ~* \.(jpg|jpeg|png|gif|webp|avif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://nextjs_upstream;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # API rate limiting
    location /api/ {
        limit_req zone=api burst=50 nodelay;
        proxy_pass http://nextjs_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Main Application
    location / {
        proxy_pass http://nextjs_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Bot WebSocket / API
    location /socket.io/ {
        proxy_pass http://bot_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    
    # Bot API Direct Access
    location /api/bot/ {
        proxy_pass http://bot_upstream/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # TSH — Tournament Stream Helper (overlays + WebSocket)
    location = /tsh {
        return 302 /tsh/;
    }

    location /tsh/ {
        proxy_pass http://tsh_upstream/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_redirect / /tsh/;
    }

    location /tsh/socket.io/ {
        proxy_pass http://tsh_upstream/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
